[project]
name = "fast-mac-gsplat"
version = "0.1.0"
description = "Torch-compatible differentiable Gaussian splat rasterizer for Metal"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["torch"]

[build-system]
requires = ["setuptools>=68", "wheel", "torch"]
build-backend = "setuptools.build_meta"
